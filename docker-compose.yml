services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - media:/app/media
    ports: ["8000:8000"]
    depends_on: [redis]
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A academiq worker -l info --concurrency=4
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - media:/app/media
    tmpfs:
      - /tmp/repos:size=2g
    depends_on: [redis, backend]
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A academiq beat -l info
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on: [redis, backend]
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    ports: ["3000:3000"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on: [backend]
    restart: unless-stopped

volumes:
  media:
